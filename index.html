<!doctype html>
<html lang="es-MX">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JalisGO! — Un viaje por la región de los Altos</title>
    <meta name="description" content="JalisGO! — Un viaje por nuestro hermoso Jalisco. Explora Jalisco de forma interactiva." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./assets/css/styles.css" />
  </head>
  <body class="landing-page">
    <main class="hero">
      <h1 class="sr-only">JalisGO!</h1>

      <div class="logo-container">
        <img
          class="logo"
          src="./assets/images/pagina_principal/JalisGO!.png"
          width="600"
          height="200"
          alt="JalisGO! Logo"
          decoding="async"
        />

        <p class="tagline">"Un viaje por nuestro hermoso Jalisco"</p>
        <div class="map-region">
          <a class="map-cta" href="mapa.html" aria-label="Entrar al mapa de Jalisco">
            <img
              class="region-map"
              src="./assets/images/pagina_principal/BotonJalisco.svg"
              alt="Mapa de la región de los Altos de Jalisco"
              decoding="async"
            />
          </a>
        </div>
      </div>
    </main>
  </body>
</html>
